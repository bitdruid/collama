name: Publish Extension

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (validate + package, no upload)"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ github.ref_name }}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $TAG doesn't match package.json version $PKG"
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        run: npx -y @vscode/vsce publish -p "$VSCE_PAT" ${{ inputs.dry-run && '--dry-run' || '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Publish failed! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
